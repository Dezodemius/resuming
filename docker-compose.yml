services:

  # ── Ollama (локальная AI-модель) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: resuming-ollama
    restart: unless-stopped
    # Лимит памяти: загрузка слишком большой модели упадёт внутри контейнера,
    # а не задушит всю VM (иначе nginx/app перестают отвечать и сайт отдаёт 522)
    mem_limit: 6g
    environment:
      - OLLAMA_KEEP_ALIVE=24h   # держим модель в памяти, а не перегружаем на каждый запрос
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Раскомментируй если есть NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── FastAPI приложение ────────────────────────────────────────────────
  app:
    build: .
    container_name: resuming-app
    restart: unless-stopped
    env_file: .env
    environment:
      - OLLAMA_URL=http://ollama:11434   # ollama доступен по имени сервиса
    volumes:
      - app_data:/app/data              # SQLite база
    depends_on:
      - ollama

  # ── Nginx (реверс-прокси, порт 80 наружу) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: resuming-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # ── Ops MCP-сервер (диагностика прода для Claude Code) ───────────────
  # Порты наружу НЕ публикуются: доступ только из сети compose (через cloudflared).
  # ВНИМАНИЕ: docker.sock внутри контейнера = root на хосте (см. ops_mcp/README.md).
  ops-mcp:
    build: ./ops_mcp
    container_name: resuming-ops-mcp
    restart: unless-stopped
    environment:
      - OPS_MCP_TOKEN=${OPS_MCP_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Cloudflare Tunnel (ops.резюмирую.рф → ops-mcp:8765) ──────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: resuming-cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - ops-mcp

volumes:
  ollama_data:   # модели хранятся между перезапусками
  app_data:      # база данных
