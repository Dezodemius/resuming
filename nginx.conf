server {
    listen 80;
    server_name резюмирую.рф xn--e1aedprev8fe.xn--p1ai;

    # Cloudflare передаёт реальный IP пользователя в этом заголовке
    real_ip_header    CF-Connecting-IP;

    # Долгий таймаут для AI-генераций (до 2 минут)
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;

    # Размер тела для загрузки файлов
    client_max_body_size  10M;

    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # MCP (streamable-http): потоковые/долгие ответы — не буферизуем
    location /mcp {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_http_version 1.1;
    }
}
