<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}{% endblock %} — Резюмирую.рф</title>
<meta name="description" content="{% block meta_desc %}{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=2">
<link rel="manifest" href="/static/site.webmanifest">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1C3F;--gold:#F0A520;--bg:#F2F5FA;--text:#1E293B;--muted:#64748B;--border:#E2E8F0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;display:flex;flex-direction:column;line-height:1.7}
header{background:var(--navy);color:#fff;padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;text-decoration:none}
.header-nav{display:flex;gap:4px}
.nav-a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;padding:5px 10px;border-radius:6px;transition:all .15s}
.nav-a:hover{color:#fff;background:rgba(255,255,255,.1)}
main{flex:1;padding:2.5rem 1.5rem 3rem}
.legal-wrap{max-width:720px;margin:0 auto}
.legal-wrap h1{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:.5rem}
.legal-wrap .subtitle{font-size:13px;color:var(--muted);margin-bottom:2.5rem}
.legal-wrap h2{font-size:15px;font-weight:600;color:var(--navy);margin:2rem 0 .75rem;padding-top:.5rem;border-top:1px solid var(--border)}
.legal-wrap h2:first-of-type{border-top:none;margin-top:0}
.legal-wrap p{font-size:13px;color:#334155;margin-bottom:.875rem;line-height:1.75}
.legal-wrap ul,.legal-wrap ol{padding-left:1.5rem;margin-bottom:.875rem}
.legal-wrap li{font-size:13px;color:#334155;margin-bottom:.375rem;line-height:1.65}
.legal-wrap strong{color:var(--text);font-weight:500}
.legal-wrap .requisites{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-top:2rem}
.legal-wrap .requisites p{margin-bottom:.375rem}
</style>
</head>
<body>
<header>
  <a class="logo" href="/"><img src="/static/banner.png" alt="Резюмирую.рф" height="34"></a>
  <nav class="header-nav">
    <a class="nav-a" href="/">Генератор</a>
    <a class="nav-a" href="/resumes">Мои резюме</a>
    <a class="nav-a" href="/pricing">Тарифы</a>
  </nav>
</header>

<main>
  <div class="legal-wrap">
    <h1>{% block page_title %}{% endblock %}</h1>
    <p class="subtitle">{% block page_subtitle %}{% endblock %}</p>
    {% block content %}{% endblock %}
  </div>
</main>

{% include '_footer.html' %}
</body>
</html>
