            - text: . Поскольку доступ к Pro открывается сразу после оплаты, возврат за уже оказанную услугу возможен при ненадлежащем качестве по вине Оператора (в течение 3 рабочих дней). Если после оплаты подписка не активировалась — напишите нам, и мы восстановим доступ или вернём средства.
        - generic [ref=f9e95]:
