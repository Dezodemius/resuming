          - generic [ref=f9e86]: Как происходит оплата?
          - generic [ref=f9e87]: Оплата проходит через защищённый платёжный сервис ЮKassa. Поддерживаются карты Visa, Mastercard, МИР, а также оплата через СБП. Данные карты не хранятся на нашем сервере.
        - generic [ref=f9e88]:
          - generic [ref=f9e89]: Подписка продлевается автоматически?
          - generic [ref=f9e90]: Нет. Подписка не продлевается автоматически — оплата списывается только один раз. По окончании 30 дней аккаунт переходит на бесплатный тариф. Чтобы продолжить пользоваться Pro, нужно оплатить снова.
        - generic [ref=f9e91]:
          - generic [ref=f9e92]: Можно ли вернуть деньги?
